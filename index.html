<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Lite</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 20px;
}
h1 { font-size: 56px; margin-bottom: 8px; background: linear-gradient(90deg, #4CAF50, #81C784); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.subtitle { font-size: 20px; color: #aaa; margin-bottom: 40px; }
.links { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
.links a {
  display: inline-block; padding: 16px 36px; border-radius: 8px;
  text-decoration: none; font-size: 18px; font-weight: 600;
  transition: transform 0.2s, box-shadow 0.2s;
}
.links a:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
.play { background: #4CAF50; color: #fff; }
.download { background: #2196F3; color: #fff; }
.info { background: #333; color: #fff; }
.footer { margin-top: 60px; color: #555; font-size: 14px; }
.footer a { color: #4CAF50; text-decoration: none; }
</style>
</head>
<body>
<h1>Minecraft Lite</h1>
<p class="subtitle">A browser-based voxel sandbox game</p>
<div class="links">
  <a href="https://localmine.io:3443" class="play">Play Online</a>
  <a href="https://localminedownload.com" class="download">Download Desktop App</a>
  <a href="https://mochimochinfo.com" class="info">About MochiMoch</a>
</div>
<div class="footer">
  <p>Made by <a href="https://mochimochinfo.com">MochiMoch</a></p>
</div>
</body>
</html>
